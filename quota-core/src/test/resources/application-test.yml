spring:
  application:
    name: quota-system-test
  config:
    import: "optional:nacos:"
  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

logging:
  level:
    com.bank.quota: DEBUG
    org.hibernate.SQL: DEBUG

quota:
  system:
    id: 1
    name: 额度管理系统
    version: 1.0.0
    environment: TEST
    default-currency: CNY
    timezone: Asia/Shanghai
    date-format: yyyy-MM-dd
    datetime-format: yyyy-MM-dd HH:mm:ss
    decimal-scale: 2
    rounding-mode: HALF_UP
    lock:
      timeout-seconds: 30
      retry-times: 3
      retry-interval-ms: 1000
    cache:
      local-cache-enable: true
      local-cache-size: 1000
      local-cache-expire-seconds: 300
      redis-cache-expire-seconds: 600
    async:
      core-pool-size: 5
      max-pool-size: 10
      queue-capacity: 100
      thread-name-prefix: async-
    rate-limit:
      enabled: true
      default-limit: 100
      default-interval-seconds: 60
    security:
      encryption:
        enabled: true
        algorithm: AES
        key-size: 256
        key: dGVzdC1rZXktMTIzNDU2Nzg5MA==
      signature:
        enabled: true
        algorithm: SHA256withRSA
      timestamp:
        tolerance-seconds: 300
      whitelist:
        enabled: false
        paths:
          - /api/v1/health
          - /actuator/**
    audit:
      enabled: true
      async: true
      batch-size: 100
      queue-capacity: 1000
    risk:
      warning:
        enabled: true
        check-interval-seconds: 60

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

---
spring:
  config:
    activate:
      on-profile: unit-test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
  jpa:
    hibernate:
      ddl-auto: create-drop

logging:
  level:
    com.bank.quota: DEBUG
    org.hibernate.SQL: DEBUG
